name: Daily Market Brief

permissions:
  contents: write

on:
  schedule:
    # 4:30 PM ET during daylight saving time = 20:30 UTC (covers most of the year)
    # During standard time (Nov-Mar) this runs at 3:30 PM EST, acceptable trade-off
    - cron: '30 20 * * 1-5'
  workflow_dispatch:
    # Allow manual triggering from GitHub Actions tab

jobs:
  generate-brief:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install yahoo-finance2

      - name: Generate market data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          node collectMarketData.js > marketBrief_$(date +%Y-%m-%d).json

      - name: Generate HTML report
        run: |
          node generateBrief.js marketBrief_$(date +%Y-%m-%d).json

      - name: Commit and push
        run: |
          git config --global user.email "noreply@github.com"
          git config --global user.name "Daily Brief Bot"
          git config --global credential.helper store
          echo "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com" > ~/.git-credentials
          git add index.html archive/*.html marketBrief_*.json
          git commit -m "Daily brief $(date +%Y-%m-%d)" || echo "No changes"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
